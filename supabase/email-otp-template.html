<div style="font-family: Inter, Arial, sans-serif; background: #071014; color: #e7f4ef; padding: 32px;">
  <div style="max-width: 560px; margin: 0 auto; background: #101a20; border: 1px solid rgba(231,244,239,.12); border-radius: 20px; padding: 32px;">
    <p style="margin: 0 0 16px; color: #5fe0b7; font-weight: 700;">Study Capture</p>
    <h1 style="margin: 0 0 16px; color: #ffffff; font-size: 28px; line-height: 1.2;">Your login code</h1>
    <p style="margin: 0 0 20px; color: rgba(231,244,239,.72); line-height: 1.7;">
      Enter this 6-digit code on the Study Capture login screen.
    </p>
    <div style="font-size: 34px; letter-spacing: .28em; font-weight: 800; color: #ffffff; background: rgba(255,255,255,.06); border-radius: 14px; padding: 18px 20px; text-align: center;">
      {{ .Token }}
    </div>
    <p style="margin: 20px 0 0; color: rgba(231,244,239,.58); font-size: 14px; line-height: 1.7;">
      This code expires automatically. If you did not request it, you can ignore this email.
    </p>
  </div>
</div>
